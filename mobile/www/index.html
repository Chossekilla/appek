<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<title>APPEK</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="login" class="card">
    <div class="logo">A</div>
    <h1>APPEK</h1>
    <p class="sub">Přihlaš se svým e-mailem</p>
    <input id="email" type="email" inputmode="email" autocomplete="username" autocapitalize="off" placeholder="tvuj@email.cz">
    <button id="go" class="btn">Pokračovat →</button>
    <p id="err" class="err" hidden></p>
    <button id="manual" class="link">Zadat adresu instalace ručně</button>
  </div>
  <script src="app.js"></script>
</body>
</html>
