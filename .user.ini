; ════════════════════════════════════════════════════════════
; 🔧 Appek B2B — PHP nastavení pro PHP-FPM hostingy
; (Wedos, Hostinger, Forpsi, Active24, Endora, Webglobe…)
;
; Tento soubor automaticky načítá PHP-FPM — funguje tam, kde
; .htaccess php_value direktivy ne (většina moderních hostingů).
;
; Po nahrání může trvat až 5 minut, než se změny projeví.
; ════════════════════════════════════════════════════════════

; Upload limity
upload_max_filesize = 10M
post_max_size = 12M
max_file_uploads = 20

; Vykonání
max_execution_time = 60
memory_limit = 128M

; Bezpečnost
display_errors = Off
display_startup_errors = Off
log_errors = On
expose_php = Off

; Session (citlivá data uvnitř)
session.cookie_httponly = 1
session.cookie_secure = 0
session.use_only_cookies = 1
session.cookie_samesite = "Lax"

; UTF-8 default
default_charset = "UTF-8"
