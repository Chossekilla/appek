<!--
  🛡️ Detekce starých prohlížečů — běží PŘED načtením CSS/JS aplikace.
  Pokud prohlížeč nemá fetch / Promise / CSS variables, ukáže přátelský banner
  a doporučí aktualizaci. Aplikace pojede dál (best-effort) i tak.
-->
<script>
(function() {
  try {
    // Minimum: fetch, Promise, CSS variables, querySelector
    var ok = typeof window.fetch === 'function'
          && typeof window.Promise === 'function'
          && typeof document.querySelector === 'function'
          && window.CSS && window.CSS.supports && CSS.supports('color', 'var(--x)');
    if (ok) return;

    // Detekuj jméno prohlížeče pro lepší hlášku
    var ua = navigator.userAgent || '';
    var name = 'Prohlížeč';
    if (/MSIE|Trident/i.test(ua)) name = 'Internet Explorer';
    else if (/Edge\/1[2-7]/.test(ua)) name = 'Starý Edge';
    else if (/Chrome\/[0-7]\d\./.test(ua)) name = 'Starý Chrome';
    else if (/Firefox\/[0-6]\d\./.test(ua)) name = 'Starý Firefox';
    else if (/Safari/.test(ua) && /Version\/[0-9]\./.test(ua)) name = 'Starý Safari';

    document.addEventListener('DOMContentLoaded', function() {
      var banner = document.createElement('div');
      banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#FFF8E5;border-bottom:2px solid #BA7517;padding:14px 20px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;line-height:1.5;color:#854F0B;box-shadow:0 2px 8px rgba(0,0,0,0.1)';
      banner.innerHTML = '⚠️ <strong>' + name + ' je zastaralý.</strong> Aplikace může fungovat omezeně.\
        <br><span style="font-size:12px">Pro 100% funkčnost prosím aktualizujte prohlížeč:\
        <a href="https://www.google.com/chrome/" style="color:#BA7517;text-decoration:underline" target="_blank">Chrome</a>,\
        <a href="https://www.microsoft.com/edge" style="color:#BA7517;text-decoration:underline" target="_blank">Edge</a>,\
        <a href="https://www.mozilla.org/firefox/" style="color:#BA7517;text-decoration:underline" target="_blank">Firefox</a>.</span>\
        <button onclick="this.parentNode.remove()" style="float:right;background:transparent;border:1px solid #BA7517;color:#854F0B;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;margin-left:10px">✕ Zavřít</button>';
      document.body.insertBefore(banner, document.body.firstChild);
    });
  } catch (e) {
    // Kdyby i tahle detekce selhala (úplně starý browser), nic neudělá
  }
})();
</script>

<!-- 🚀 v2.9.314 — Lazy i18n: CS users (~80% bázi) předtím tahali 4 MB JS zbytečně.
     i18n_auto.js (2.3 MB, EN+ES) a i18n_extra.js (1.7 MB, SK+DE) se teď loadují
     jen pro non-CS jazyky. Switching at runtime: window.loadI18nForLang() v i18n.js. -->
<script>
(function lazyLoadI18n() {
  var lang;
  try { lang = localStorage.getItem('appek_lang'); } catch (e) { lang = null; }
  if (!lang || lang === 'cs') return; // CS users — žádný overhead
  // EN/ES needs i18n_auto.js. SK/DE need both.
  // document.write je deprecated ale funguje synchronně před admin.js — což je co potřebujeme.
  if (lang === 'en' || lang === 'es' || lang === 'sk' || lang === 'de') {
    document.write('<script src="i18n_auto.js?v=3.0.425"><\/script>');
  }
  if (lang === 'sk' || lang === 'de') {
    document.write('<script src="i18n_extra.js?v=3.0.425"><\/script>');
  }
})();
</script>

<script>
// 🔄 AUTO-CHECK pro update — admin loadne → ptáme se vendora.
//    v2.9.52 — Client-side semver kontrola: pill se ukáže JEN když je
//    latest SKUTEČNĚ vyšší než current (server může vrátit false-positive
//    pokud na vendoru existuje test-build vyšší verze).
(async function autoCheckUpdate() {
  // Semver compare — vrátí >0 pokud a>b, <0 pokud a<b, 0 pokud rovny
  function semverCmp(a, b) {
    const pa = String(a).split('.').map(n => parseInt(n, 10) || 0);
    const pb = String(b).split('.').map(n => parseInt(n, 10) || 0);
    for (let i = 0; i < 3; i++) {
      const x = pa[i] || 0, y = pb[i] || 0;
      if (x > y) return 1;
      if (x < y) return -1;
    }
    return 0;
  }
  try {
    const vRes = await fetch('../api/version.php', { cache: 'no-cache' });
    if (!vRes.ok) return;
    const v = await vRes.json();
    if (!v.version || !v.license_key) return;
    const current = v.version;
    const license = v.license_key.toUpperCase();

    const endpoints = [
      'https://appek.cz/api/updates_check.php',
      'https://vendor.appek.cz/api/updates_check.php',
      '/api/updates_check.php',
    ];
    let res = null;
    for (const url of endpoints) {
      try {
        const r = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            license_key: license, current_version: current, channel: 'stable',
            packages: ['core', 'cukrarna', 'lahudky', 'restaurace', 'catering', 'sezona'],
          }),
        });
        if (!r.ok) continue;
        const j = await r.json();
        if (j.ok) { res = j; break; }
      } catch (e) {}
    }
    const pill = document.getElementById('update-pill');

    // Pokud nemáme odpověď, nebo server neřekl update_available → pill SKRYTÝ
    if (!res || !res.update_available || !res.latest || !res.latest.version) {
      if (pill) pill.style.display = 'none';
      return;
    }

    const latest = res.latest.version;

    // 🛡️ KLÍČOVÁ KONTROLA — pill jen pokud latest je SKUTEČNĚ novější než current.
    // Tím zmizí "skákající" upozornění když je už aplikace aktuální.
    if (semverCmp(latest, current) <= 0) {
      if (pill) pill.style.display = 'none';
      return;
    }

    const text = document.getElementById('update-pill-text');
    if (pill && text) {
      text.textContent = `🆕 Nová verze ${latest}`;
      pill.style.display = 'inline-flex';
      pill.title = `Z verze ${current} → ${latest}. Klikni pro aktualizaci.`;
    }
    if (typeof window.toastInfo === 'function') {
      setTimeout(() => window.toastInfo(`🆕 Nová verze ${latest} k dispozici · klikni nahoře`), 800);
    }
  } catch (e) {}
})();
</script>

<!-- 📱 PWA: Service Worker + Install prompt -->
<script>
(function() {
  // Registrace service workeru
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      // 🐛 v3.0.402 — sw.php místo sw.js: hcdn CDN cachuje statické .js 7 dní
      //   (ignoruje origin no-cache) → klienti drželi starý SW/admin.js/footer.
      navigator.serviceWorker.register('sw.php', { scope: '/admin/' })
        .then((reg) => {
          console.log('[PWA] SW registered, scope:', reg.scope);
          // Detekce nové verze
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker?.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                showSWUpdateBanner();
              }
            });
          });
        })
        .catch((err) => console.warn('[PWA] SW register failed:', err));
    });
  }

  // ─── Install prompt — zachyť beforeinstallprompt event ─────────
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    showInstallBanner();
  });

  window.addEventListener('appinstalled', () => {
    hideInstallBanner();
    deferredPrompt = null;
    try { localStorage.setItem('appek_pwa_installed', '1'); } catch (e) {}
  });

  function getLang() {
    return (window.appekCurrentLang || localStorage.getItem('appek_lang') || 'cs').substring(0,2).toLowerCase();
  }

  const PWA_I18N = {
    cs: {
      install_title: '📱 Nainstalovat APPEK jako aplikaci',
      install_body: 'Rychlejší přístup z plochy, offline mód, push notifikace.',
      install_btn: 'Instalovat',
      install_later: 'Později',
      update_title: '🔄 Nová verze APPEK',
      update_body: 'Aktualizace připravena — refresh aplikuje změny.',
      update_btn: 'Aktualizovat',
    },
    en: {
      install_title: '📱 Install APPEK as app',
      install_body: 'Faster access from home screen, offline mode, push notifications.',
      install_btn: 'Install',
      install_later: 'Later',
      update_title: '🔄 New APPEK version',
      update_body: 'Update ready — refresh to apply.',
      update_btn: 'Update',
    },
    es: {
      install_title: '📱 Instalar APPEK como app',
      install_body: 'Acceso rápido desde inicio, modo offline, notificaciones push.',
      install_btn: 'Instalar',
      install_later: 'Más tarde',
      update_title: '🔄 Nueva versión APPEK',
      update_body: 'Actualización lista — refresca para aplicar.',
      update_btn: 'Actualizar',
    },
  };

  function t(key) {
    const lang = getLang();
    return (PWA_I18N[lang] || PWA_I18N.cs)[key] || PWA_I18N.cs[key];
  }

  function showInstallBanner() {
    // Skip if uživatel už nainstaloval nebo banner odmítl v posledních 7 dnech
    try {
      if (localStorage.getItem('appek_pwa_installed') === '1') return;
      const dismissed = parseInt(localStorage.getItem('appek_pwa_dismissed') || '0', 10);
      if (dismissed && (Date.now() - dismissed) < 7 * 24 * 60 * 60 * 1000) return;
    } catch (e) {}

    if (document.getElementById('pwa-install-banner')) return;

    const banner = document.createElement('div');
    banner.id = 'pwa-install-banner';
    banner.style.cssText = `
      position: fixed; bottom: 14px; right: 14px; left: 14px;
      max-width: 380px; margin-left: auto;
      background: linear-gradient(135deg, #1d1d1f, #2d2d30);
      color: #fff; padding: 16px 18px; border-radius: 14px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      z-index: 99999; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex; gap: 12px; align-items: flex-start;
      animation: pwa-slide-in 0.4s ease-out;
    `;
    banner.innerHTML = `
      <div style="font-size:30px;line-height:1">📱</div>
      <div style="flex:1">
        <strong style="display:block;font-size:14px;margin-bottom:4px">${t('install_title')}</strong>
        <span style="font-size:12.5px;color:rgba(255,255,255,0.75);line-height:1.5">${t('install_body')}</span>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button id="pwa-install-go" style="background:linear-gradient(180deg,#BA7517,#854F0B);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer">${t('install_btn')}</button>
          <button id="pwa-install-later" style="background:transparent;color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.15);padding:8px 14px;border-radius:8px;font-family:inherit;font-size:13px;cursor:pointer">${t('install_later')}</button>
        </div>
      </div>
    `;
    document.body.appendChild(banner);

    document.getElementById('pwa-install-go').onclick = async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        try { localStorage.setItem('appek_pwa_installed', '1'); } catch (e) {}
      }
      deferredPrompt = null;
      hideInstallBanner();
    };
    document.getElementById('pwa-install-later').onclick = () => {
      try { localStorage.setItem('appek_pwa_dismissed', String(Date.now())); } catch (e) {}
      hideInstallBanner();
    };

    // Auto-add animation CSS once
    if (!document.getElementById('pwa-banner-styles')) {
      const st = document.createElement('style');
      st.id = 'pwa-banner-styles';
      st.textContent = `@keyframes pwa-slide-in { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }`;
      document.head.appendChild(st);
    }
  }

  function hideInstallBanner() {
    const b = document.getElementById('pwa-install-banner');
    if (b) b.remove();
  }

  function showSWUpdateBanner() {
    if (document.getElementById('pwa-update-banner')) return;
    // 🆕 v3.0.111 — neukazuj banner na login page (user: "skáče aktualizovat přes login")
    const loginVisible = document.getElementById('login-screen') &&
                         getComputedStyle(document.getElementById('login-screen')).display !== 'none';
    const appHidden = document.getElementById('app') &&
                      getComputedStyle(document.getElementById('app')).display === 'none';
    if (loginVisible || appHidden) {
      // Zkus znovu za 5s — možná user se mezitím přihlásí
      setTimeout(showSWUpdateBanner, 5000);
      return;
    }
    const banner = document.createElement('div');
    banner.id = 'pwa-update-banner';
    banner.style.cssText = `
      position: fixed; top: 14px; right: 14px;
      background: #0058b8; color: #fff;
      padding: 14px 18px; border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,88,184,0.4);
      z-index: 99999; font-family: -apple-system, sans-serif;
      max-width: 340px;
    `;
    banner.innerHTML = `
      <strong style="display:block;font-size:14px;margin-bottom:4px">${t('update_title')}</strong>
      <span style="font-size:12.5px;display:block;margin-bottom:10px">${t('update_body')}</span>
      <button id="pwa-update-go" style="background:#fff;color:#0058b8;border:none;padding:7px 14px;border-radius:6px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer">${t('update_btn')}</button>
    `;
    document.body.appendChild(banner);
    document.getElementById('pwa-update-go').onclick = () => window.location.reload();
  }
})();
</script>

<!-- 🏷️ App version footer — v2.9.65: klik otevře deploy-check.php (ověření obsahu souborů) -->
<div class="app-version-footer" id="app-version-footer" title="APPEK B2B verze — klikni pro deploy-check"
     style="cursor:pointer" onclick="location.href='deploy-check.php'">APPEK v…</div>
<script>
(function showVersion() {
  var el = document.getElementById('app-version-footer');
  if (!el) return;

  // 1) Verze admin.js (konstanta)
  var jsVer = (typeof APPEK_ADMIN_JS_VERSION !== 'undefined') ? APPEK_ADMIN_JS_VERSION : null;

  // 2) Verze admin.css — přes CSS custom property --appek-css-version
  var cssVer = null;
  try {
    var raw = getComputedStyle(document.documentElement)
      .getPropertyValue('--appek-css-version').trim().replace(/['"]/g, '');
    if (raw) cssVer = raw;
  } catch (e) {}

  // 3) Verze backendu — z api/version.php (config.php)
  fetch('../api/version.php', { cache: 'no-cache' })
    .then(function(r){ return r.json(); })
    .then(function(d){ render(d && d.version ? d.version : null); })
    .catch(function(){ render(null); });

  function render(phpVer) {
    var shown = jsVer || phpVer || cssVer || '?';
    // Posbírej co se LIŠÍ — deploy je nekompletní pokud js/css/php nejsou stejné
    var parts = [];
    if (jsVer)  parts.push(jsVer);
    if (cssVer) parts.push(cssVer);
    if (phpVer) parts.push(phpVer);
    var allSame = parts.length > 0 && parts.every(function(x){ return x === parts[0]; });

    if (allSame) {
      el.textContent = 'APPEK v' + shown;
      el.classList.remove('version-mismatch');
      el.title = 'APPEK B2B v' + shown + ' — JS, CSS i backend sedí ✓\n'
               + 'Klikni → deploy-check.php (ověří SHA-256 obsahu všech souborů)';
    } else {
      // ⚠️ Nekompletní deploy — některý soubor je starý
      el.textContent = '⚠️ APPEK — nekompletní deploy';
      el.classList.add('version-mismatch');
      el.title = 'POZOR — nesedí verze souborů:\n'
               + '· admin.js:  v' + (jsVer  || '?') + '\n'
               + '· admin.css: v' + (cssVer || '?') + '\n'
               + '· backend:   v' + (phpVer || '?') + '\n\n'
               + 'Klikni → deploy-check.php ukáže přesně které soubory zůstaly staré.';
      console.warn('[APPEK] ⚠️ Version mismatch — js=' + jsVer + ' css=' + cssVer + ' php=' + phpVer);
    }
    // 🆕 v2.9.82 — naplň i spodní patičku (verze + stav deploye)
    var fv = document.getElementById('af-ver');
    if (fv) fv.textContent = 'v' + shown;
    var fs = document.getElementById('af-status');
    if (fs) {
      fs.textContent = allSame ? '✓ deploy v pořádku' : '⚠️ nekompletní deploy';
      fs.className = 'af-cell af-status ' + (allSame ? 'af-ok' : 'af-bad');
    }
  }
})();
</script>
<style>
  .app-version-footer.version-mismatch {
    background: #FEE2E2 !important;
    color: #991B1B !important;
    border: 1px solid #FCA5A5 !important;
    font-weight: 700 !important;
    cursor: help !important;
  }
</style>
