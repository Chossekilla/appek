<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#1d1d1f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Číšník">
<title>📱 Mobilní číšník — APPEK</title>
<script src="_feature_lang.js"></script>
<script src="_barcode_scanner.js"></script>
<style>
:root {
  --gold-1: #BA7517; --gold-2: #854F0B;
  --bg: #0a0a0a; --card: #1a1a1a; --border: #2a2a2a;
  --text: #fff; --text-2: #b8b8b8; --text-3: #6e6e73;
  --ok: #34c759; --warn: #ff9500;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
body {
  font-family: -apple-system, system-ui, sans-serif;
  background: var(--bg); color: var(--text); margin: 0;
  height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
}
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 18px; border-radius: 10px; background: linear-gradient(180deg, var(--gold-1), var(--gold-2)); color: #fff; text-decoration: none; font-size: 14px; font-weight: 700; border: none; cursor: pointer; font-family: inherit; min-height: 48px; }
.btn.ghost { background: rgba(255,255,255,0.1); color: #fff; }
.btn.danger { background: linear-gradient(180deg, #ff453a, #c0271e); }
.btn.ok { background: linear-gradient(180deg, #34c759, #1f9244); }
.btn:active { transform: scale(0.96); }

/* HEADER */
.mw-head {
  background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
  padding: env(safe-area-inset-top) 16px 12px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  padding-top: max(env(safe-area-inset-top), 14px);
}
.mw-head h1 { margin: 0; font-size: 17px; flex: 1; }
.mw-head .icon-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,0.1); border: none; color: #fff;
  font-size: 18px; cursor: pointer;
}

/* TABS */
.mw-tabs {
  display: flex; padding: 6px; gap: 4px;
  background: var(--card); border-bottom: 1px solid var(--border);
}
.mw-tab {
  flex: 1; padding: 10px; border: none; background: none;
  color: var(--text-2); font: inherit; font-size: 13px; font-weight: 700;
  border-radius: 8px; cursor: pointer;
}
.mw-tab.active { background: linear-gradient(180deg, var(--gold-1), var(--gold-2)); color: #fff; }

/* CONTENT */
.mw-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px; }

/* TABLES GRID */
.tables-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
.table-card {
  background: var(--card); border: 2px solid var(--border);
  border-radius: 12px; padding: 14px 10px;
  aspect-ratio: 1.1 / 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s;
}
.table-card:active { transform: scale(0.95); }
.table-card.busy { border-color: var(--warn); background: rgba(255,149,0,0.08); }
.table-card.busy::before { content: '🔴'; position: absolute; top: 6px; right: 6px; font-size: 10px; }
.table-card.free { border-color: var(--ok); background: rgba(52,199,89,0.08); }
.table-card .num { font-size: 32px; font-weight: 800; line-height: 1; }
.table-card .info { font-size: 11px; color: var(--text-2); margin-top: 4px; text-align: center; }

/* MENU */
.menu-search-bar { display: flex; gap: 8px; margin-bottom: 12px; }
.menu-search { flex: 1; padding: 12px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: #fff; font: inherit; font-size: 14px; }
.scan-btn {
  width: 48px; height: 48px; border-radius: 12px; background: var(--gold-1); color: #fff;
  border: none; font-size: 20px; cursor: pointer; flex-shrink: 0;
}
.menu-cats { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 10px; }
.menu-cat { padding: 6px 14px; background: var(--card); border: 1px solid var(--border); color: var(--text-2); border-radius: 999px; font-size: 12px; font-weight: 600; white-space: nowrap; cursor: pointer; }
.menu-cat.active { background: var(--gold-1); color: #fff; border-color: var(--gold-1); }

.menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
.menu-item {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 10px;
  cursor: pointer; transition: all 0.12s;
}
.menu-item:active { transform: scale(0.95); }
.menu-item .nm { font-size: 13px; font-weight: 700; line-height: 1.3; min-height: 34px; }
.menu-item .pr { font-size: 16px; font-weight: 800; color: var(--gold-1); margin-top: 6px; }

/* ORDER */
.order-empty { text-align: center; padding: 60px 20px; color: var(--text-3); }
.order-empty .emj { font-size: 48px; margin-bottom: 12px; }
.order-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.order-item {
  background: var(--card); border-radius: 10px; padding: 10px 12px;
  display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: center;
}
.order-item .nm { font-size: 13.5px; font-weight: 600; }
.order-item .qty {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 8px;
}
.qty button { width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 18px; cursor: pointer; }
.qty .v { min-width: 22px; text-align: center; font-weight: 700; font-size: 14px; }
.order-item .pr { font-size: 14px; font-weight: 800; color: var(--gold-1); }

.order-totals {
  background: linear-gradient(135deg, var(--gold-1), var(--gold-2));
  border-radius: 12px; padding: 14px 16px; color: #fff;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}
.order-totals .lbl { font-size: 11px; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.5px; }
.order-totals .val { font-size: 22px; font-weight: 800; }

.action-row { display: flex; gap: 8px; }
.action-row .btn { flex: 1; }

/* FOOTER */
.mw-foot {
  background: var(--card); border-top: 1px solid var(--border);
  padding: 10px 14px env(safe-area-inset-bottom);
  display: flex; gap: 8px; align-items: center;
  padding-bottom: max(env(safe-area-inset-bottom), 10px);
}
.cart-summary { flex: 1; }
.cart-summary .l { font-size: 10px; color: var(--text-3); text-transform: uppercase; }
.cart-summary .v { font-size: 18px; font-weight: 800; color: var(--gold-1); }

.upsell { padding: 60px 24px; text-align: center; color: var(--text-2); }
.upsell .em { font-size: 56px; margin-bottom: 16px; }
.upsell h2 { color: #fff; }
</style>
</head>
<body>

<div class="mw-head">
  <button class="icon-btn" onclick="location.href='/admin/'" title="Zpět do adminu">←</button>
  <h1 id="title">📱 Mobilní číšník</h1>
  <button class="icon-btn" onclick="appekScanner.open({ onScan: addByScan })" title="Naskenovat kód">📷</button>
</div>

<div class="mw-tabs">
  <button class="mw-tab active" data-tab="tables" onclick="switchTab('tables')">🪑 Stoly</button>
  <button class="mw-tab" data-tab="menu" onclick="switchTab('menu')">🍽️ Menu</button>
  <button class="mw-tab" data-tab="order" onclick="switchTab('order')">📋 Objednávka <span id="cart-badge" style="display:none;background:#ff453a;padding:1px 6px;border-radius:999px;font-size:10px;margin-left:4px">0</span></button>
</div>

<div class="mw-content" id="content"></div>

<div class="mw-foot" id="foot" style="display:none">
  <div class="cart-summary">
    <div class="l">Stůl <strong id="ft-table">—</strong> · <strong id="ft-count">0</strong> položek</div>
    <div class="v" id="ft-total">0 Kč</div>
  </div>
  <button class="btn ok" onclick="sendToKitchen()">📤 Do kuchyně</button>
</div>

<script>
window.T = {
  title:   { cs: '📱 Mobilní číšník', en: '📱 Mobile waiter', es: '📱 Camarero móvil' },
  tables:  { cs: 'Stoly', en: 'Tables', es: 'Mesas' },
  menu:    { cs: 'Menu', en: 'Menu', es: 'Menú' },
  order:   { cs: 'Objednávka', en: 'Order', es: 'Pedido' },
  upsell:  { cs: 'Funkce vyžaduje balíček Restaurace', en: 'Requires Restaurant package', es: 'Requiere paquete Restaurante' },
};
const $ = (s, el=document) => el.querySelector(s);
const t = key => featureLang.t(window.T[key] || key);
document.title = t('title') + ' — APPEK';

const state = {
  tab: 'tables',
  vyrobky: [],
  categories: [],
  selectedCat: '',
  searchText: '',
  tableNum: null,
  cart: new Map(), // vyrobek_id → { vyrobek, qty }
  tables: [], // mock data
};

// USB scanner — naslouchá globálně klávesnici (USB čtečka)
appekScanner.listenUsbInput(code => {
  addByScan(code);
});

async function load() {
  try {
    // Načti výrobky (z admin_vyrobky.php nebo /api/vyrobky.php — jednodušší: použij /api/produkty.php pokud existuje, jinak admin_vyrobky)
    const r = await fetch('../api/admin_vyrobky.php', { credentials: 'include' });
    if (r.status === 402) {
      $('#content').innerHTML = `<div class="upsell"><div class="em">🔒</div><h2>${t('upsell')}</h2><p>Aktivuj balíček Restaurace v adminu nebo dokup licenci.</p></div>`;
      return;
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    state.vyrobky = (data.vyrobky || data.list || data || []).filter(v => v.aktivni == 1);
    state.categories = [...new Set(state.vyrobky.map(v => v.kategorie_nazev).filter(Boolean))];

    // Mock tables 1-20
    state.tables = Array.from({ length: 20 }, (_, i) => ({
      num: i + 1,
      status: Math.random() > 0.7 ? 'busy' : 'free',
      guests: Math.random() > 0.7 ? Math.ceil(Math.random() * 6) : 0,
    }));

    render();
  } catch (e) {
    $('#content').innerHTML = `<div class="upsell"><div class="em">❌</div><p>${e.message}</p></div>`;
  }
}

function switchTab(tab) {
  state.tab = tab;
  document.querySelectorAll('.mw-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  render();
}

function render() {
  const c = $('#content');
  if (state.tab === 'tables') {
    c.innerHTML = `
      <div class="tables-grid">
        ${state.tables.map(t => `
          <div class="table-card ${t.status}" style="position:relative" onclick="pickTable(${t.num})">
            <div class="num">${t.num}</div>
            <div class="info">${t.status === 'busy' ? `🔴 ${t.guests} hostů` : '🟢 Volný'}</div>
          </div>
        `).join('')}
      </div>
    `;
  } else if (state.tab === 'menu') {
    const filtered = state.vyrobky.filter(v => {
      if (state.selectedCat && v.kategorie_nazev !== state.selectedCat) return false;
      if (state.searchText) {
        const q = state.searchText.toLowerCase();
        return (v.nazev || '').toLowerCase().includes(q) || (v.cislo || '').toLowerCase().includes(q);
      }
      return true;
    });
    c.innerHTML = `
      <div class="menu-search-bar">
        <input class="menu-search" type="search" placeholder="Hledat..." value="${escAttr(state.searchText)}" oninput="state.searchText = this.value; render()">
        <button class="scan-btn" onclick="appekScanner.open({ onScan: addByScan })">📷</button>
      </div>
      <div class="menu-cats">
        <div class="menu-cat ${!state.selectedCat ? 'active' : ''}" onclick="state.selectedCat=''; render()">Vše</div>
        ${state.categories.map(cat => `<div class="menu-cat ${state.selectedCat===cat?'active':''}" onclick="state.selectedCat='${escAttr(cat)}'; render()">${escHtml(cat)}</div>`).join('')}
      </div>
      <div class="menu-grid">
        ${filtered.map(v => `
          <div class="menu-item" onclick="addToCart(${v.id})">
            <div class="nm">${escHtml(v.nazev)}</div>
            <div class="pr">${Math.round(v.cena_bez_dph || 0)} Kč</div>
          </div>
        `).join('')}
      </div>
    `;
  } else if (state.tab === 'order') {
    if (!state.cart.size) {
      c.innerHTML = `<div class="order-empty"><div class="emj">📋</div><strong>Prázdná objednávka</strong><p>Přidej položky z menu</p></div>`;
    } else {
      const items = [...state.cart.values()];
      const total = items.reduce((s, it) => s + (it.qty * it.vyrobek.cena_bez_dph), 0);
      c.innerHTML = `
        <div class="order-list">
          ${items.map(it => `
            <div class="order-item">
              <div class="nm">${escHtml(it.vyrobek.nazev)}</div>
              <div class="qty">
                <button onclick="changeQty(${it.vyrobek.id}, -1)">−</button>
                <span class="v">${it.qty}</span>
                <button onclick="changeQty(${it.vyrobek.id}, 1)">+</button>
              </div>
              <div class="pr">${Math.round(it.qty * it.vyrobek.cena_bez_dph)} Kč</div>
            </div>
          `).join('')}
        </div>
        <div class="order-totals">
          <div><div class="lbl">Stůl ${state.tableNum ?? '—'} · ${items.reduce((s,it)=>s+it.qty,0)} položek</div></div>
          <div class="val">${Math.round(total)} Kč</div>
        </div>
        <div class="action-row">
          <button class="btn ghost" onclick="state.cart.clear(); render(); updateFoot()">🗑️ Vyprázdnit</button>
          <button class="btn ok" onclick="sendToKitchen()">📤 Do kuchyně</button>
        </div>
      `;
    }
  }
  updateFoot();
}

function pickTable(num) {
  state.tableNum = num;
  switchTab('menu');
}

function addToCart(vyrobekId) {
  const v = state.vyrobky.find(x => x.id == vyrobekId);
  if (!v) return;
  const existing = state.cart.get(vyrobekId);
  if (existing) existing.qty++;
  else state.cart.set(vyrobekId, { vyrobek: v, qty: 1 });
  // haptic
  if (navigator.vibrate) navigator.vibrate(15);
  render();
  updateFoot();
}

function changeQty(vyrobekId, delta) {
  const item = state.cart.get(vyrobekId);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) state.cart.delete(vyrobekId);
  render();
  updateFoot();
}

function addByScan(code) {
  // Find by cislo or EAN
  const v = state.vyrobky.find(x =>
    x.cislo === code || x.ean === code ||
    (x.cislo || '').toLowerCase() === code.toLowerCase()
  );
  if (v) {
    addToCart(v.id);
    if (navigator.vibrate) navigator.vibrate([20, 30, 20]);
  } else {
    alert('❌ Kód "' + code + '" nenalezen v menu.');
  }
}

function sendToKitchen() {
  if (!state.cart.size) { alert('Prázdná objednávka.'); return; }
  if (!state.tableNum) { alert('Vyber stůl.'); switchTab('tables'); return; }
  if (!confirm(`Poslat objednávku na stůl ${state.tableNum} do kuchyně?\n${state.cart.size} položek · ${Math.round([...state.cart.values()].reduce((s,it)=>s+(it.qty*it.vyrobek.cena_bez_dph),0))} Kč`)) return;

  // TODO: API call → admin_kitchen.php / admin_objednavky.php
  alert(`✅ Objednávka stůl ${state.tableNum} odeslána do kuchyně!\n\n(API integrace pošle do kitchen_queue v další iteraci)`);
  state.cart.clear();
  state.tableNum = null;
  switchTab('tables');
}

function updateFoot() {
  const foot = $('#foot');
  if (state.cart.size && state.tab !== 'order') {
    foot.style.display = 'flex';
    const items = [...state.cart.values()];
    const total = items.reduce((s, it) => s + (it.qty * it.vyrobek.cena_bez_dph), 0);
    $('#ft-table').textContent = state.tableNum ?? '—';
    $('#ft-count').textContent = items.reduce((s,it)=>s+it.qty,0);
    $('#ft-total').textContent = Math.round(total) + ' Kč';
  } else {
    foot.style.display = 'none';
  }
  const badge = $('#cart-badge');
  if (state.cart.size) {
    badge.style.display = 'inline';
    badge.textContent = [...state.cart.values()].reduce((s,it)=>s+it.qty,0);
  } else badge.style.display = 'none';
}

function escHtml(s) { return String(s ?? '').replace(/[&<>"]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[m])); }
function escAttr(s) { return escHtml(s).replace(/'/g, '&#39;'); }

load();
</script>
</body>
</html>
