<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>🎂 Cake configurator — APPEK</title>
<script src="_feature_lang.js"></script>
<style>
:root {
  --gold-1: #BA7517; --gold-2: #854F0B;
  --pink: #E91E63;
  --text-1: #1d1d1f; --text-2: #424245; --text-3: #6e6e73;
  --bg: #fafafa; --card: #fff; --border: #e5e5e7; --ok: #208438;
}
* { box-sizing: border-box; }
body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 16px; color: var(--text-1); }
.wrap { max-width: 1200px; margin: 0 auto; }
.head { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px; margin-bottom: 18px; }
.head h1 { font-size: 26px; margin: 0 0 6px; }
.head .sub { color: var(--text-3); font-size: 13.5px; }
.btn { display: inline-block; padding: 9px 16px; border-radius: 8px; background: linear-gradient(180deg, var(--gold-1), var(--gold-2)); color: #fff; text-decoration: none; font-size: 13px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; }
.btn.ghost { background: var(--card); color: var(--text-1); border: 1px solid var(--border); }
.btn:hover { opacity: 0.9; }

.layout { display: grid; grid-template-columns: 1fr 360px; gap: 18px; }
@media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

.config-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 22px 28px; }
.config-card h2 { font-size: 16px; margin: 0 0 14px; color: var(--pink); }
.config-step { margin-bottom: 22px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
.config-step:last-of-type { border-bottom: none; }
.config-step .step-l { font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 8px; }
.opt-row { display: flex; flex-wrap: wrap; gap: 8px; }
.opt { background: #fafafa; border: 2px solid var(--border); border-radius: 10px; padding: 10px 14px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.15s; }
.opt:hover { border-color: var(--pink); }
.opt.selected { background: linear-gradient(135deg, #fff0f4, #fff8e8); border-color: var(--pink); color: var(--pink); }
.opt .price { display: block; font-size: 11px; font-weight: 500; color: var(--text-3); margin-top: 2px; }
.opt.selected .price { color: var(--pink); }

.tier-control { display: flex; align-items: center; gap: 12px; }
.tier-btn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--border); background: #fff; font-size: 18px; cursor: pointer; }
.tier-btn:hover { border-color: var(--pink); }
.tier-val { font-size: 24px; font-weight: 800; min-width: 50px; text-align: center; }

.summary-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 22px 24px; position: sticky; top: 16px; }
.summary-card h3 { margin: 0 0 14px; font-size: 16px; }
.cake-preview { background: linear-gradient(135deg, #fff0f4, #fff8e8); border-radius: 12px; padding: 24px; text-align: center; margin-bottom: 14px; }
.cake-icon { font-size: 64px; margin-bottom: 8px; }
.cake-spec { font-size: 12px; color: var(--text-3); line-height: 1.6; }

.price-table { font-size: 13px; margin-bottom: 14px; }
.price-table .pr { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #f5f5f7; }
.price-table .pr.total { font-size: 18px; font-weight: 800; color: var(--gold-1); border-top: 2px solid var(--border); border-bottom: none; padding-top: 10px; margin-top: 5px; }

.meta-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.meta-pill { background: #f5f5f7; padding: 4px 10px; border-radius: 999px; font-size: 11.5px; font-weight: 600; }

.upsell { max-width: 540px; margin: 80px auto; padding: 36px; background: var(--card); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; }
.upsell .em { font-size: 56px; margin-bottom: 16px; }
.upsell h2 { font-size: 22px; margin: 0 0 10px; }
.upsell p { color: var(--text-2); line-height: 1.6; margin: 0 0 22px; }
.upsell .pkg-price { background: rgba(186,117,23,0.08); padding: 14px 18px; border-radius: 10px; margin: 0 0 22px; }
.upsell .pkg-price .l { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.4px; }
.upsell .pkg-price .v { font-size: 28px; font-weight: 800; color: var(--gold-1); }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <h1 data-i18n="title">🎂 Cake configurator</h1>
      <div class="sub" data-i18n="subtitle">Vizuálně sestav narozeninový/svatební dort. Cena se přepočítává okamžitě.</div>
    </div>
    <a href="/admin/" class="btn ghost" data-i18n="back">← Zpět</a>
  </div>

  <div id="content"></div>
</div>

<script>
window.T = {
  title:    { cs: '🎂 Cake configurator',                                                                       en: '🎂 Cake configurator',                                                       es: '🎂 Configurador de tartas' },
  subtitle: { cs: 'Vizuálně sestav narozeninový/svatební dort. Cena se přepočítává okamžitě.',              en: 'Visually build a birthday/wedding cake. Price updates live.',                es: 'Construye visualmente una tarta de cumpleaños/boda. El precio se actualiza al instante.' },
  back:     { cs: '← Zpět',                                                                                     en: '← Back',                                                                      es: '← Atrás' },
  upsell:   { cs: 'Funkce vyžaduje balíček Cukrárna',                                                          en: 'Feature requires the Patisserie package',                                    es: 'La función requiere el paquete Pastelería' },
  pkg_p:    { cs: 'Cena balíčku Cukrárna',                                                                      en: 'Patisserie package price',                                                    es: 'Precio del paquete Pastelería' },
  pkg_l:    { cs: 'Jednorázově, doživotně',                                                                      en: 'One-time, lifetime',                                                          es: 'Pago único, de por vida' },
  unlock:   { cs: '🔓 Dokoupit balíček',                                                                          en: '🔓 Buy package',                                                              es: '🔓 Comprar paquete' },
  step:     { cs: 'Sestavte dort krok po kroku',                                                                  en: 'Build a cake step by step',                                                  es: 'Construye la tarta paso a paso' },
  shape:    { cs: 'Tvar',                                                                                          en: 'Shape',                                                                        es: 'Forma' },
  size:     { cs: 'Velikost (průměr)',                                                                              en: 'Size (diameter)',                                                              es: 'Tamaño (diámetro)' },
  tiers:    { cs: 'Počet pater',                                                                                    en: 'Number of tiers',                                                              es: 'Número de pisos' },
  tier_x:   { cs: 'každé patro × 1.65',                                                                              en: 'each tier × 1.65',                                                              es: 'cada piso × 1.65' },
  flavor:   { cs: 'Příchuť těsta',                                                                                    en: 'Sponge flavor',                                                                  es: 'Sabor del bizcocho' },
  fillings: { cs: 'Náplně (vyber 1-3)',                                                                                en: 'Fillings (pick 1-3)',                                                            es: 'Rellenos (elige 1-3)' },
  decos:    { cs: 'Dekorace (kombinuj)',                                                                                en: 'Decorations (combine)',                                                          es: 'Decoraciones (combina)' },
  serves:   { cs: 'porcí',                                                                                                en: 'servings',                                                                        es: 'porciones' },
  summary:  { cs: '📋 Souhrn',                                                                                              en: '📋 Summary',                                                                      es: '📋 Resumen' },
  leadtime: { cs: '⏱️ Lead time:',                                                                                          en: '⏱️ Lead time:',                                                                  es: '⏱️ Plazo:' },
  days:     { cs: 'dní',                                                                                                    en: 'days',                                                                            es: 'días' },
  base:     { cs: 'Základ',                                                                                                en: 'Base',                                                                            es: 'Base' },
  vat:      { cs: 'DPH 12 %',                                                                                                en: 'VAT 12 %',                                                                          es: 'IVA 12 %' },
  no_vat:   { cs: 'Bez DPH',                                                                                                  en: 'Excl. VAT',                                                                          es: 'Sin IVA' },
  total:    { cs: 'Celkem',                                                                                                    en: 'Total',                                                                              es: 'Total' },
  save_as:  { cs: '💾 Uložit jako objednávku',                                                                                en: '💾 Save as order',                                                                  es: '💾 Guardar como pedido' },
  todo:     { cs: 'Funkce uložení do objednávek bude přidána v další verzi.',                                                en: 'Save to orders coming in a future version.',                                          es: 'La función de guardar pedido llegará en próxima versión.' },
  patro:    { cs: 'patro',                                                                                                      en: 'tier',                                                                              es: 'piso' },
};
const $ = (s, el = document) => el.querySelector(s);
const t = key => featureLang.t(window.T[key] || key);
document.title = t('title') + ' — APPEK';
featureLang.renderPills();
featureLang.applyToDom();

let options = null;
const state = {
  shape: 'round',
  size_cm: 18,
  tiers: 1,
  flavor: 'vanilla',
  fillings: [],
  decorations: [],
};

async function load() {
  try {
    const r = await fetch('../api/feature_cake_configurator.php');
    if (r.status === 402) {
      const j = await r.json();
      $('#content').innerHTML = `
        <div class="upsell">
          <div class="em">🔒</div>
          <h2>${t('upsell')}</h2>
          <p>${j.message}</p>
          <div class="pkg-price">
            <div class="l">${t('pkg_p')}</div>
            <div class="v">2 990 Kč</div>
            <div class="l" style="margin-top:4px">${t('pkg_l')}</div>
          </div>
          <a href="https://appek.cz/checkout.html?addon=cukrarna" target="_blank" class="btn">${t('unlock')}</a>
        </div>
      `;
      return;
    }
    options = await r.json();
    renderUI();
    calculate();
  } catch (e) {
    $('#content').innerHTML = `<div class="upsell"><div class="em">❌</div><h2>${e.message}</h2></div>`;
  }
}

function renderUI() {
  $('#content').innerHTML = `
    <div class="layout">
      <div class="config-card">
        <h2>📐 ${t('step')}</h2>

        <div class="config-step">
          <div class="step-l">1️⃣ ${t('shape')}</div>
          <div class="opt-row">
            ${options.shapes.map(s => `
              <div class="opt ${state.shape === s.id ? 'selected' : ''}" onclick="setOpt('shape','${s.id}')">
                ${s.name}<span class="price">×${s.price_mult.toFixed(2)}</span>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="config-step">
          <div class="step-l">2️⃣ ${t('size')}</div>
          <div class="opt-row">
            ${options.sizes.map(s => `
              <div class="opt ${state.size_cm === s.cm ? 'selected' : ''}" onclick="setOpt('size_cm',${s.cm})">
                ${s.cm} cm<span class="price">~${s.serves} ${t('serves')} · od ${s.base_price} Kč</span>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="config-step">
          <div class="step-l">3️⃣ ${t('tiers')}</div>
          <div class="tier-control">
            <button class="tier-btn" onclick="setTiers(state.tiers - 1)">−</button>
            <div class="tier-val">${state.tiers}</div>
            <button class="tier-btn" onclick="setTiers(state.tiers + 1)">+</button>
            <span style="color:#6e6e73;font-size:12px;margin-left:8px">${t('tier_x')}</span>
          </div>
        </div>

        <div class="config-step">
          <div class="step-l">4️⃣ ${t('flavor')}</div>
          <div class="opt-row">
            ${options.flavors.map(f => `
              <div class="opt ${state.flavor === f.id ? 'selected' : ''}" onclick="setOpt('flavor','${f.id}')">
                ${f.name}${f.price_add ? `<span class="price">+${f.price_add} Kč</span>` : ''}
              </div>
            `).join('')}
          </div>
        </div>

        <div class="config-step">
          <div class="step-l">5️⃣ ${t('fillings')}</div>
          <div class="opt-row">
            ${options.fillings.map(f => `
              <div class="opt ${state.fillings.includes(f.id) ? 'selected' : ''}" onclick="toggleMulti('fillings','${f.id}')">
                ${f.name}<span class="price">+${f.price_add} Kč</span>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="config-step">
          <div class="step-l">6️⃣ ${t('decos')}</div>
          <div class="opt-row">
            ${options.decorations.map(d => `
              <div class="opt ${state.decorations.includes(d.id) ? 'selected' : ''}" onclick="toggleMulti('decorations','${d.id}')">
                ${d.name}<span class="price">+${d.price_add} Kč</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>

      <div class="summary-card" id="summary"></div>
    </div>
  `;
}

function setOpt(key, val) {
  state[key] = val;
  renderUI();
  calculate();
}

function setTiers(n) {
  state.tiers = Math.max(1, Math.min(5, n));
  renderUI();
  calculate();
}

function toggleMulti(key, val) {
  if (state[key].includes(val)) state[key] = state[key].filter(x => x !== val);
  else                          state[key].push(val);
  renderUI();
  calculate();
}

async function calculate() {
  try {
    const r = await fetch('../api/feature_cake_configurator.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state),
    });
    const j = await r.json();
    renderSummary(j);
  } catch (e) { /* ignore */ }
}

function renderSummary(j) {
  const fmt = (n) => Math.round(n).toLocaleString('cs-CZ') + ' Kč';

  const cakeEmoji = state.tiers === 1 ? '🎂' :
                    state.tiers === 2 ? '🎂🎂' :
                    state.tiers === 3 ? '🎂🎂🎂' :
                                         '🏔️🎂';

  let html = `
    <h3>${t('summary')}</h3>
    <div class="cake-preview">
      <div class="cake-icon">${cakeEmoji}</div>
      <div class="cake-spec">
        ${j.spec.shape.name} · ${j.spec.size.cm} cm · ${j.tiers || state.tiers} ${t('patro')}<br>
        ${j.spec.flavor.name}<br>
        <strong>~${j.serves} ${t('serves')}</strong>
      </div>
    </div>

    <div class="meta-pills">
      <span class="meta-pill">${t('leadtime')} ${j.lead_time_days} ${t('days')}</span>
      ${j.spec.fillings.length ? `<span class="meta-pill">${j.spec.fillings.length} ${t('fillings').toLowerCase()}</span>` : ''}
      ${j.spec.decorations.length ? `<span class="meta-pill">${j.spec.decorations.length} ${t('decos').toLowerCase()}</span>` : ''}
    </div>

    <div class="price-table">
      <div class="pr"><span>${t('base')} (${j.spec.size.cm} cm)</span><span>${fmt(j.pricing.base)}</span></div>
      <div class="pr"><span>${t('shape')} × ${j.pricing.shape_mult}</span><span>×</span></div>
      <div class="pr"><span>${t('tiers')} × ${j.pricing.tier_mult}</span><span>×</span></div>
      ${j.pricing.flavor_add ? `<div class="pr"><span>${t('flavor')}</span><span>+${fmt(j.pricing.flavor_add)}</span></div>` : ''}
      ${j.pricing.fillings ? `<div class="pr"><span>${t('fillings')}</span><span>+${fmt(j.pricing.fillings)}</span></div>` : ''}
      ${j.pricing.decorations ? `<div class="pr"><span>${t('decos')}</span><span>+${fmt(j.pricing.decorations)}</span></div>` : ''}
      <div class="pr"><span>${t('no_vat')}</span><span>${fmt(j.pricing.bez_dph)}</span></div>
      <div class="pr"><span>${t('vat')}</span><span>${fmt(j.pricing.dph)}</span></div>
      <div class="pr total"><span>${t('total')}</span><span>${fmt(j.pricing.celkem)}</span></div>
    </div>

    <button class="btn" style="width:100%" onclick="alert(${JSON.stringify(t('todo'))})">${t('save_as')}</button>
  `;
  $('#summary').innerHTML = html;
}

load();
</script>
</body>
</html>
