<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>🍂 Sezónní šablony — APPEK</title>
<script src="_feature_lang.js"></script>
<style>
:root {
  --gold-1: #BA7517; --gold-2: #854F0B;
  --text-1: #1d1d1f; --text-2: #424245; --text-3: #6e6e73;
  --bg: #fafafa; --card: #fff; --border: #e5e5e7;
  --ok: #208438;
}
* { box-sizing: border-box; }
body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 16px; color: var(--text-1); }
.wrap { max-width: 1200px; margin: 0 auto; }
.head { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px; margin-bottom: 18px; }
.head h1 { font-size: 26px; margin: 0 0 6px; }
.head .sub { color: var(--text-3); font-size: 13.5px; }
.btn { display: inline-block; padding: 9px 16px; border-radius: 8px; background: linear-gradient(180deg, var(--gold-1), var(--gold-2)); color: #fff; text-decoration: none; font-size: 13px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; }
.btn.ghost { background: var(--card); color: var(--text-1); border: 1px solid var(--border); }
.btn.danger { background: linear-gradient(180deg,#ff6b6b,#c62828); }
.btn:hover { opacity: 0.9; }

.tpl-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 16px; }
.tpl-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 22px 24px; transition: all 0.2s; }
.tpl-card.in-season { border-color: var(--gold-1); background: linear-gradient(135deg, #fff, #fff8e8); box-shadow: 0 4px 16px rgba(186,117,23,0.1); }
.tpl-card h2 { font-size: 20px; margin: 0 0 4px; }
.tpl-card .desc { color: var(--text-2); font-size: 13.5px; line-height: 1.5; margin: 6px 0 12px; }
.tpl-meta { display: flex; gap: 10px; flex-wrap: wrap; font-size: 12px; color: var(--text-3); margin-bottom: 14px; }
.tpl-meta .badge { background: #f5f5f7; padding: 3px 9px; border-radius: 999px; font-weight: 600; }
.tpl-meta .badge.season { background: var(--ok); color: #fff; }
.tpl-actions { display: flex; gap: 8px; }
.tpl-items { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: none; }
.tpl-items.open { display: block; }
.tpl-items table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.tpl-items table td { padding: 4px 6px; border-bottom: 1px solid #f5f5f7; }
.tpl-items table .name { font-weight: 600; }
.tpl-items table .price { color: var(--gold-1); font-weight: 700; text-align: right; white-space: nowrap; }
.toggle-items { background: none; border: none; color: var(--text-3); font-size: 12px; cursor: pointer; padding: 4px 0; font-family: inherit; }

.toast { position: fixed; bottom: 24px; right: 24px; background: var(--ok); color: #fff; padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; box-shadow: 0 4px 16px rgba(0,0,0,0.2); transform: translateY(80px); opacity: 0; transition: all 0.3s; z-index: 1000; max-width: 380px; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.err { background: #b30019; }

.upsell { max-width: 540px; margin: 80px auto; padding: 36px; background: var(--card); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; }
.upsell .em { font-size: 56px; margin-bottom: 16px; }
.upsell h2 { font-size: 22px; margin: 0 0 10px; }
.upsell p { color: var(--text-2); line-height: 1.6; margin: 0 0 22px; }
.upsell .pkg-price { background: rgba(186,117,23,0.08); padding: 14px 18px; border-radius: 10px; margin: 0 0 22px; }
.upsell .pkg-price .l { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.4px; }
.upsell .pkg-price .v { font-size: 28px; font-weight: 800; color: var(--gold-1); }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <h1 data-i18n="title">🍂 Sezónní šablony</h1>
      <div class="sub" data-i18n="subtitle">One-click vložení sezónního sortimentu. Šablona = sada vyrobků s cenami, gramáží a alergeny. Aktivuj/deaktivuj podle období.</div>
    </div>
    <a href="/admin/" class="btn ghost" data-i18n="back">← Zpět do adminu</a>
  </div>

  <div id="content"></div>
</div>

<div id="toast" class="toast"></div>

<script>
window.T = {
  title:      { cs: '🍂 Sezónní šablony',                                                                                                                          en: '🍂 Seasonal templates',                                                                                                            es: '🍂 Plantillas de temporada' },
  subtitle:   { cs: 'One-click vložení sezónního sortimentu. Šablona = sada vyrobků s cenami, gramáží a alergeny. Aktivuj/deaktivuj podle období.',  en: 'One-click load a seasonal assortment. Template = a set of products with prices, weight and allergens. Activate/deactivate by season.',  es: 'Carga el surtido de temporada con un clic. Plantilla = conjunto de productos con precios, peso y alérgenos.' },
  back:       { cs: '← Zpět do adminu',                                                                                                                            en: '← Back to admin',                                                                                                                  es: '← Volver al admin' },
  items:      { cs: 'položek',                                                                                                                                      en: 'items',                                                                                                                            es: 'items' },
  period:     { cs: 'Období',                                                                                                                                       en: 'Period',                                                                                                                           es: 'Período' },
  current:    { cs: '🟢 Aktuální sezóna',                                                                                                                          en: '🟢 In season now',                                                                                                                  es: '🟢 Temporada actual' },
  apply:      { cs: '⚡ Vložit do sortimentu',                                                                                                                      en: '⚡ Insert into catalog',                                                                                                           es: '⚡ Insertar en el catálogo' },
  deactivate: { cs: '🌙 Deaktivovat',                                                                                                                              en: '🌙 Deactivate',                                                                                                                    es: '🌙 Desactivar' },
  show:       { cs: 'Zobrazit položky ▾',                                                                                                                            en: 'Show items ▾',                                                                                                                      es: 'Mostrar items ▾' },
  hide:       { cs: 'Skrýt položky ▴',                                                                                                                                en: 'Hide items ▴',                                                                                                                      es: 'Ocultar items ▴' },
  upsell_t:   { cs: 'Funkce vyžaduje balíček Sezónní akce',                                                                                                          en: 'Feature requires the Seasonal package',                                                                                            es: 'La función requiere el paquete Temporada' },
  pkg_price:  { cs: 'Cena balíčku Sezónní',                                                                                                                          en: 'Seasonal package price',                                                                                                            es: 'Precio del paquete Temporada' },
  pkg_life:   { cs: 'Jednorázově, doživotně',                                                                                                                          en: 'One-time, lifetime',                                                                                                                es: 'Pago único, de por vida' },
  unlock:     { cs: '🔓 Dokoupit balíček',                                                                                                                            en: '🔓 Buy package',                                                                                                                    es: '🔓 Comprar paquete' },
  confirm_ins:{ cs: 'Opravdu vložit šablonu',                                                                                                                          en: 'Really insert template',                                                                                                            es: '¿Insertar realmente la plantilla' },
  confirm_de: { cs: 'Opravdu deaktivovat šablonu',                                                                                                                      en: 'Really deactivate template',                                                                                                        es: '¿Desactivar realmente la plantilla' },
  ok_ins:     { cs: 'vloženo',                                                                                                                                          en: 'inserted',                                                                                                                          es: 'insertado' },
  ok_upd:     { cs: 'aktualizováno',                                                                                                                                    en: 'updated',                                                                                                                            es: 'actualizado' },
  of:         { cs: 'z',                                                                                                                                                en: 'of',                                                                                                                                es: 'de' },
  ok_de:      { cs: 'deaktivováno',                                                                                                                                      en: 'deactivated',                                                                                                                        es: 'desactivado' },
  vyrobku:    { cs: 'vyrobků',                                                                                                                                          en: 'products',                                                                                                                          es: 'productos' },
};
const $ = (s, el = document) => el.querySelector(s);
const t = key => featureLang.t(window.T[key] || key);
document.title = t('title') + ' — APPEK';
featureLang.renderPills();
featureLang.applyToDom();
const toast = (msg, isErr = false) => {
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(() => t.classList.remove('show'), 3000);
};

async function load() {
  try {
    const r = await fetch('../api/feature_seasonal_templates.php');
    if (r.status === 402) {
      const j = await r.json();
      $('#content').innerHTML = `
        <div class="upsell">
          <div class="em">🔒</div>
          <h2>${t('upsell_t')}</h2>
          <p>${j.message || ''}</p>
          <div class="pkg-price">
            <div class="l">${t('pkg_price')}</div>
            <div class="v">1 990 Kč</div>
            <div class="l" style="margin-top:4px">${t('pkg_life')}</div>
          </div>
          <a href="https://appek.cz/checkout.html?addon=sezona" target="_blank" class="btn">${t('unlock')}</a>
        </div>
      `;
      return;
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    render(j.templates || {});
  } catch (e) {
    $('#content').innerHTML = `<div class="upsell"><div class="em">❌</div><h2>Chyba</h2><p>${e.message}</p></div>`;
  }
}

function render(templates) {
  const arr = Object.values(templates);
  // Sort: in-season first
  arr.sort((a, b) => (b.is_in_season ? 1 : 0) - (a.is_in_season ? 1 : 0));

  let html = '<div class="tpl-grid">';
  for (const tpl of arr) {
    const period = `${tpl.period.from} → ${tpl.period.to}`;
    html += `<div class="tpl-card ${tpl.is_in_season ? 'in-season' : ''}">
      <h2>${tpl.name}</h2>
      <div class="tpl-meta">
        <span class="badge">${tpl.item_count} ${t('items')}</span>
        <span class="badge">${t('period')}: ${period}</span>
        ${tpl.is_in_season ? `<span class="badge season">${t('current')}</span>` : ''}
      </div>
      <div class="desc">${tpl.desc}</div>
      <div class="tpl-actions">
        <button class="btn" onclick="apply('${tpl.id}', 'insert', '${tpl.name.replace(/'/g, "\\'")}')">${t('apply')}</button>
        <button class="btn ghost" onclick="apply('${tpl.id}', 'deactivate', '${tpl.name.replace(/'/g, "\\'")}')">${t('deactivate')}</button>
        <button class="toggle-items" onclick="toggleItems(this)">${t('show')}</button>
      </div>
      <div class="tpl-items">
        <table>
          ${tpl.items.map(it => `<tr>
            <td class="name">${it.nazev}</td>
            <td>${it.hmotnost_g ? it.hmotnost_g + ' g' : ''}</td>
            <td>${it.alergeny || '—'}</td>
            <td class="price">${it.cena} Kč</td>
          </tr>`).join('')}
        </table>
      </div>
    </div>`;
  }
  html += '</div>';
  $('#content').innerHTML = html;
}

function toggleItems(btn) {
  const items = btn.closest('.tpl-card').querySelector('.tpl-items');
  items.classList.toggle('open');
  btn.textContent = items.classList.contains('open') ? t('hide') : t('show');
}

async function apply(id, action, name) {
  const msg = (action === 'insert' ? t('confirm_ins') : t('confirm_de')) + ` "${name}"?`;
  if (!confirm(msg)) return;
  try {
    const r = await fetch('../api/feature_seasonal_templates.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ template_id: id, action }),
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || 'HTTP ' + r.status);
    if (action === 'insert') {
      toast(`✓ ${name}: ${t('ok_ins')} ${j.inserted}, ${t('ok_upd')} ${j.updated} ${t('of')} ${j.total}`);
    } else {
      toast(`✓ ${name}: ${t('ok_de')} ${j.deactivated} ${t('vyrobku')}`);
    }
    load();
  } catch (e) {
    toast('❌ ' + e.message, true);
  }
}

load();
</script>
</body>
</html>
