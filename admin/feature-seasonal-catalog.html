<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>🍂 Sezónní katalog — APPEK</title>
<script src="_feature_lang.js"></script>
<style>
:root {
  --gold-1: #BA7517; --gold-2: #854F0B;
  --text-1: #1d1d1f; --text-2: #424245; --text-3: #6e6e73;
  --bg: #fafafa; --card: #fff; --border: #e5e5e7; --ok: #208438;
}
* { box-sizing: border-box; }
body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 16px; color: var(--text-1); }
.wrap { max-width: 1400px; margin: 0 auto; }
.head { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px; margin-bottom: 18px; }
.head h1 { font-size: 26px; margin: 0 0 6px; }
.head .sub { color: var(--text-3); font-size: 13.5px; }
.btn { display: inline-block; padding: 9px 16px; border-radius: 8px; background: linear-gradient(180deg, var(--gold-1), var(--gold-2)); color: #fff; text-decoration: none; font-size: 13px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; }
.btn.ghost { background: var(--card); color: var(--text-1); border: 1px solid var(--border); }
.btn.big { padding: 13px 22px; font-size: 14.5px; }
.btn:hover { opacity: 0.9; }

.layout { display: grid; grid-template-columns: 360px 1fr; gap: 18px; }
@media (max-width: 1100px) { .layout { grid-template-columns: 1fr; } }

/* CONFIG SIDEBAR */
.config-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 22px 24px; position: sticky; top: 16px; }
.config-card h2 { font-size: 15px; margin: 0 0 14px; }
.config-card .field { margin-bottom: 14px; }
.config-card label { font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.4px; display: block; margin-bottom: 5px; }
.config-card input, .config-card select, .config-card textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font: inherit; font-size: 13.5px; }
.config-card textarea { min-height: 80px; resize: vertical; }

/* THEME PICKER */
.theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.theme-card { background: var(--card); border: 2px solid var(--border); border-radius: 10px; padding: 10px 8px; cursor: pointer; text-align: center; transition: all 0.15s; }
.theme-card.selected { border-color: var(--gold-1); background: #fff8e8; transform: translateY(-1px); }
.theme-card .emj { font-size: 22px; }
.theme-card .nm { font-size: 11px; font-weight: 700; margin-top: 3px; }

/* PRODUCT PICKER */
.products-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.products-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
.products-head h2 { margin: 0; font-size: 16px; }
.products-search { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font: inherit; font-size: 13px; min-width: 200px; }
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; padding: 16px; max-height: 70vh; overflow-y: auto; }
.prod-card { background: #fafafa; border: 2px solid var(--border); border-radius: 10px; padding: 10px 12px; cursor: pointer; transition: all 0.15s; position: relative; }
.prod-card:hover { border-color: var(--gold-1); }
.prod-card.selected { background: #fff8e8; border-color: var(--gold-1); }
.prod-card.selected::after { content: '✓'; position: absolute; top: 6px; right: 8px; background: var(--gold-1); color: #fff; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; }
.prod-card .nm { font-size: 13px; font-weight: 700; line-height: 1.3; min-height: 32px; }
.prod-card .meta { font-size: 11px; color: var(--text-3); margin-top: 4px; }
.prod-card .price { font-size: 14px; font-weight: 800; color: var(--gold-1); margin-top: 6px; }

/* PREVIEW PANEL */
.preview-pane { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-top: 18px; }
.preview-pane h2 { font-size: 16px; margin: 0 0 14px; }
.preview-iframe { width: 100%; height: 650px; border: 1px solid var(--border); border-radius: 8px; background: #fff; }

.alert { padding: 12px 16px; border-radius: 10px; margin-bottom: 14px; font-size: 13.5px; }
.alert.ok  { background: rgba(52,199,89,0.12); color: var(--ok); }
.alert.err { background: rgba(255,59,48,0.12); color: #b30019; }

.cat-chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: #f5f5f7; border-radius: 999px; font-size: 11.5px; font-weight: 600; cursor: pointer; }
.cat-chip.active { background: var(--gold-1); color: #fff; }

.actions-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
.actions-bar .btn { flex: 1; min-width: 130px; }

.upsell { max-width: 540px; margin: 80px auto; padding: 36px; background: var(--card); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; }
.upsell .em { font-size: 56px; margin-bottom: 16px; }
.upsell h2 { font-size: 22px; margin: 0 0 10px; }
.upsell .pkg-price { background: rgba(186,117,23,0.08); padding: 14px 18px; border-radius: 10px; margin: 14px 0 22px; }
.upsell .pkg-price .v { font-size: 28px; font-weight: 800; color: var(--gold-1); }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <h1 data-i18n="title">🍂 Sezónní katalog</h1>
      <div class="sub" data-i18n="subtitle">Vyber sezónní výrobky a téma → APPEK vygeneruje tematický e-mail. Posíláš odběratelům nebo tiskneš jako katalog.</div>
    </div>
    <a href="/admin/" class="btn ghost" data-i18n="back">← Zpět</a>
  </div>

  <div id="content"></div>
</div>

<script>
window.T = {
  title:    { cs: '🍂 Sezónní katalog', en: '🍂 Seasonal catalog', es: '🍂 Catálogo de temporada' },
  subtitle: { cs: 'Vyber sezónní výrobky a téma → APPEK vygeneruje tematický e-mail.', en: 'Pick seasonal products and theme → APPEK generates a themed e-mail.', es: 'Elige productos de temporada y un tema → APPEK genera un correo temático.' },
  back:     { cs: '← Zpět', en: '← Back', es: '← Atrás' },
  upsell:   { cs: 'Funkce vyžaduje balíček Sezónní akce', en: 'Feature requires the Seasonal package', es: 'La función requiere el paquete Temporada' },
};
const $ = (s, el = document) => el.querySelector(s);
const t = key => featureLang.t(window.T[key] || key);
document.title = t('title') + ' — APPEK';
featureLang.renderPills();
featureLang.applyToDom();

const state = {
  data: null,
  theme: 'vanoce',
  subject: '',
  intro: '',
  selectedIds: new Set(),
  filterText: '',
  filterCat: '',
  recipientFilter: 'all',
  previewHtml: null,
};

async function load() {
  try {
    const r = await fetch('/api/feature_seasonal_catalog.php');
    if (r.status === 402) {
      const j = await r.json();
      $('#content').innerHTML = `
        <div class="upsell">
          <div class="em">🔒</div>
          <h2>${t('upsell')}</h2>
          <p>${j.message || ''}</p>
          <div class="pkg-price">
            <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.4px;color:#6e6e73">Cena balíčku</div>
            <div class="v">1 990 Kč</div>
          </div>
          <a href="https://appek.cz/checkout.html?addon=sezona" target="_blank" class="btn">🔓 Dokoupit</a>
        </div>`;
      return;
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    state.data = await r.json();
    state.theme = Object.keys(state.data.themes)[0];
    state.subject = state.data.themes[state.theme].subject_default;
    state.intro   = state.data.themes[state.theme].intro_default;
    render();
  } catch (e) {
    $('#content').innerHTML = `<div class="alert err">❌ ${e.message}</div>`;
  }
}

function render() {
  const { themes, vyrobky, type_counts, total_recipients } = state.data;
  const cats = [...new Set(vyrobky.map(v => v.kategorie_nazev).filter(Boolean))];
  const filtered = vyrobky.filter(v => {
    if (state.filterCat && v.kategorie_nazev !== state.filterCat) return false;
    if (state.filterText) {
      const q = state.filterText.toLowerCase();
      return (v.nazev || '').toLowerCase().includes(q) || (v.cislo || '').toLowerCase().includes(q);
    }
    return true;
  });

  $('#content').innerHTML = `
    <div class="layout">
      <div class="config-card">
        <h2>🎨 Téma</h2>
        <div class="theme-grid">
          ${Object.entries(themes).map(([key, th]) => `
            <div class="theme-card ${key === state.theme ? 'selected' : ''}" onclick="selectTheme('${key}')">
              <div class="emj">${th.name.split(' ')[0]}</div>
              <div class="nm">${th.name.split(' ').slice(1).join(' ')}</div>
            </div>
          `).join('')}
        </div>

        <div class="field" style="margin-top:18px">
          <label>📧 Subject</label>
          <input id="subject" value="${escAttr(state.subject)}" oninput="state.subject = this.value">
        </div>

        <div class="field">
          <label>✏️ Intro text</label>
          <textarea id="intro" oninput="state.intro = this.value">${escHtml(state.intro)}</textarea>
        </div>

        <div class="field">
          <label>📬 Příjemci (${total_recipients} odběratelů s e-mailem)</label>
          <select id="recipient-filter" onchange="state.recipientFilter = this.value">
            <option value="all">👥 Všichni (${total_recipients})</option>
            ${type_counts.map(c => `<option value="typ:${c.typ}">${c.typ || '(bez typu)'} — ${c.pocet}</option>`).join('')}
          </select>
        </div>

        <div class="actions-bar">
          <button class="btn ghost" onclick="doPreview()">👁️ Preview</button>
          <button class="btn" onclick="doPrint()">🖨️ Tisk</button>
        </div>
        <div class="actions-bar">
          <button class="btn big" style="width:100%;background:linear-gradient(180deg,#208438,#155724)" onclick="doSend()">📧 Odeslat e-mailem</button>
        </div>
        <div style="font-size:10.5px;color:#86868b;margin-top:8px;line-height:1.5">
          Vybráno <strong>${state.selectedIds.size}</strong> z ${vyrobky.length} výrobků.
        </div>
      </div>

      <div>
        <div class="products-wrap">
          <div class="products-head">
            <h2>🛒 Vyber sezónní výrobky</h2>
            <input class="products-search" type="search" placeholder="Hledat název nebo kód…" value="${escAttr(state.filterText)}" oninput="state.filterText = this.value; render()">
            <div>
              <span class="cat-chip ${!state.filterCat ? 'active' : ''}" onclick="state.filterCat=''; render()">Všechny</span>
              ${cats.map(c => `<span class="cat-chip ${state.filterCat===c?'active':''}" onclick="state.filterCat='${escAttr(c)}'; render()">${escHtml(c)}</span>`).join('')}
            </div>
          </div>
          <div class="products-grid">
            ${filtered.map(v => {
              const sel = state.selectedIds.has(v.id);
              return `
                <div class="prod-card ${sel?'selected':''}" onclick="toggle(${v.id})">
                  <div class="nm">${escHtml(v.nazev)}</div>
                  <div class="meta">${escHtml(v.cislo || '')} · ${escHtml(v.kategorie_ikona || '')} ${escHtml(v.kategorie_nazev || '')}</div>
                  <div class="price">${Math.round(v.cena_bez_dph).toLocaleString('cs-CZ')} Kč</div>
                </div>
              `;
            }).join('')}
            ${!filtered.length ? '<div style="grid-column:1/-1;padding:30px;text-align:center;color:#86868b">Žádné výrobky.</div>' : ''}
          </div>
        </div>

        <div class="preview-pane" id="preview-pane" style="display:none">
          <h2>👁️ Preview e-mailu</h2>
          <div id="preview-result"></div>
        </div>
      </div>
    </div>
  `;
}

function selectTheme(key) {
  state.theme = key;
  state.subject = state.data.themes[key].subject_default;
  state.intro   = state.data.themes[key].intro_default;
  render();
}

function toggle(id) {
  if (state.selectedIds.has(id)) state.selectedIds.delete(id);
  else state.selectedIds.add(id);
  render();
}

async function doPreview() {
  if (!state.selectedIds.size) { alert('Vyber alespoň 1 výrobek.'); return; }
  $('#preview-pane').style.display = 'block';
  $('#preview-result').innerHTML = '<div class="alert">⏳ Generuji preview…</div>';
  try {
    const r = await fetch('/api/feature_seasonal_catalog.php?action=preview', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        theme: state.theme, subject: state.subject, intro: state.intro,
        vyrobek_ids: [...state.selectedIds],
        recipient_filter: state.recipientFilter,
      }),
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || 'HTTP ' + r.status);
    state.previewHtml = j.html;
    const blob = new Blob([j.html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    $('#preview-result').innerHTML = `
      <div class="alert ok">✅ Preview pro <strong>${j.vyrobky_count}</strong> výrobků · subject: <strong>${escHtml(j.subject)}</strong></div>
      <iframe class="preview-iframe" src="${url}"></iframe>
    `;
    $('#preview-pane').scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch (e) {
    $('#preview-result').innerHTML = `<div class="alert err">❌ ${e.message}</div>`;
  }
}

async function doPrint() {
  await doPreview();
  setTimeout(() => {
    const iframe = $('#preview-result iframe');
    if (iframe) { iframe.contentWindow.focus(); iframe.contentWindow.print(); }
  }, 600);
}

async function doSend() {
  if (!state.selectedIds.size) { alert('Vyber alespoň 1 výrobek.'); return; }
  const count = state.data.total_recipients;
  if (!confirm(`Odeslat sezónní katalog na ${count} odběratelů?\n\nPoznámka: opera Hostinger může mít rate-limit, větší listy odešle pomalu (200ms / mail).`)) return;
  $('#preview-pane').style.display = 'block';
  $('#preview-result').innerHTML = '<div class="alert">📧 Odesílám e-maily…</div>';
  try {
    const r = await fetch('/api/feature_seasonal_catalog.php?action=send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        theme: state.theme, subject: state.subject, intro: state.intro,
        vyrobek_ids: [...state.selectedIds],
        recipient_filter: state.recipientFilter,
      }),
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || 'HTTP ' + r.status);
    $('#preview-result').innerHTML = `
      <div class="alert ok">
        ✅ Odesláno: <strong>${j.sent}</strong> · Selhalo: <strong>${j.failed}</strong> · Celkem: ${j.total}
        ${j.errors && j.errors.length ? `<details style="margin-top:6px"><summary>Chyby</summary><pre style="font-size:11px">${escHtml(j.errors.join('\\n'))}</pre></details>` : ''}
      </div>
    `;
  } catch (e) {
    $('#preview-result').innerHTML = `<div class="alert err">❌ ${e.message}</div>`;
  }
}

function escHtml(s) { return String(s ?? '').replace(/[&<>"]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[m])); }
function escAttr(s) { return escHtml(s).replace(/'/g, '&#39;'); }

load();
</script>
</body>
</html>
