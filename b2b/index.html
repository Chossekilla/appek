<!-- 🛡️ Detekce starých prohlížečů (Banner pokud chybí fetch / Promise / CSS vars) -->
<script>
(function() {
  try {
    var ok = typeof window.fetch === 'function'
          && typeof window.Promise === 'function'
          && window.CSS && window.CSS.supports && CSS.supports('color', 'var(--x)');
    if (ok) return;
    var ua = navigator.userAgent || '';
    var name = 'Prohlížeč';
    if (/MSIE|Trident/i.test(ua)) name = 'Internet Explorer';
    else if (/Edge\/1[2-7]/.test(ua)) name = 'Starý Edge';
    else if (/Chrome\/[0-7]\d\./.test(ua)) name = 'Starý Chrome';
    document.addEventListener('DOMContentLoaded', function() {
      var b = document.createElement('div');
      b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#FFF8E5;border-bottom:2px solid #BA7517;padding:14px 20px;font-family:sans-serif;font-size:14px;line-height:1.5;color:#854F0B';
      b.innerHTML = '⚠️ <strong>' + name + ' <span class="b2b-i18n">je zastaralý.</span></strong> <span class="b2b-i18n">Pro pohodlné objednávání aktualizujte prohlížeč.</span>\
        <button onclick="this.parentNode.remove()" style="float:right;background:transparent;border:1px solid #BA7517;color:#854F0B;padding:4px 10px;border-radius:4px;cursor:pointer">✕</button>';
      document.body.insertBefore(b, document.body.firstChild);
    });
  } catch (e) {}
})();
</script>
<link rel="stylesheet" href="style.css?v=3.0.259">
</head>
<body>

<!-- Login screen -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">A</div>
      <h1>APPEK B2B</h1>
      <p>B2B objednávkový systém</p>
    </div>
    <form id="login-form" class="login-form">
      <label>
        <span>E-mail</span>
        <input type="email" name="email" required autocomplete="email">
      </label>
      <label>
        <span>Heslo</span>
        <input type="password" name="heslo" required autocomplete="current-password">
      </label>
      <button type="submit" class="btn-primary">Přihlásit se</button>
      <p id="login-error" class="error-msg" style="display:none;"></p>
      <div id="demo-banner" style="display:none;margin-top:14px;padding:12px 16px;background:rgba(186,117,23,0.1);border-left:3px solid #BA7517;border-radius:8px;font-size:13px;line-height:1.5">
        🧪 <strong>Demo režim</strong> — přihlašovací údaje předvyplněny. Session 15 min, auto-reset každou hodinu.
        <br><small id="demo-reset-time" style="color:#86868b"></small>
      </div>
    </form>
    <p class="login-help">Nemáte přístup? Kontaktujte dodavatele.</p>
  </div>
</div>

<script>
// 🧪 B2B Demo auto-login detection + 15min idle logout
(async function() {
  try {
    const r = await fetch('../api/demo_status.php', { cache: 'no-cache' });
    if (!r.ok) return;
    const j = await r.json();
    if (!j.demo) return;

    // Auto-fill B2B credentials (preferuj j.b2b, fallback na j.credentials)
    const creds = j.b2b || j.credentials || null;
    if (!creds) return;

    const form = document.getElementById('login-form');
    if (form) {
      const emailInput = form.querySelector('input[name="email"]');
      const heslInput  = form.querySelector('input[name="heslo"]');
      if (emailInput) emailInput.value = creds.email;
      if (heslInput)  heslInput.value  = creds.password;
    }
    const banner = document.getElementById('demo-banner');
    if (banner) {
      banner.style.display = 'block';
      const rt = document.getElementById('demo-reset-time');
      if (rt && j.reset_at) rt.textContent = '🔄 Další reset: ' + j.reset_at;
    }

    // 🆕 v3.0.185 — DEMO IDLE-RESET ODSTRANĚN (user: „reset dema pryč všude").
    //   Dřív po 15 min nečinnosti alert + logout + reload (rušilo rozdělanou
    //   objednávku). Reset demo dat je teď JEN ručně přes Nastavení → Údržba.
  } catch (e) { /* ignore */ }
})();
</script>

<!-- Hlavní aplikace -->

    </div>
  </header>

  <nav class="tabs">

      <div class="app-footer-contact" id="app-footer-contact">

</div>

<script src="../admin/_barcode_scanner.js"></script>
<script src="i18n.js?v=3.0.259"></script>
<script src="app.js?v=3.0.259"></script>
<script>
// 📷 USB barcode scanner — automaticky naslouchá rychlému keyboard inputu
if (window.appekScanner) {
  appekScanner.listenUsbInput((code) => {
    // V POS módu — automaticky najdi a přidej do košíku
    if (typeof addByEan === 'function') {
      addByEan(code);
    } else if (typeof addByScan === 'function') {
      addByScan(code);
    } else {
      // Najdi v aktivním catalog a klikni
      const card = document.querySelector(`[data-ean="${code}"], [data-cislo="${code}"]`);
      if (card) card.click();
      else console.log('Naskenovaný kód neznámý:', code);
    }
  });
}
</script>

<!-- 🏷️ App version footer -->
<div class="app-version-footer" id="app-version-footer" title="APPEK B2B portál">APPEK v…</div>
<style>
.app-version-footer {
  position: fixed; bottom: 4px; right: 8px;
  font-size: 10px; color: #888; background: rgba(255,255,255,0.85);
  padding: 2px 8px; border-radius: 999px; pointer-events: none; z-index: 1;
  font-family: 'SF Mono', Menlo, Consolas, monospace; opacity: 0.6;
  user-select: none; letter-spacing: 0.3px;
}
@media (max-width: 700px) {
  .app-version-footer { bottom: 2px; right: 4px; font-size: 9px; padding: 1px 6px; }
}
</style>
<script>
(function() {
  var el = document.getElementById('app-version-footer');
  if (!el) return;
  fetch('../api/version.php').then(r => r.json()).then(d => {
    if (d && d.version) el.textContent = 'APPEK v' + d.version;
  }).catch(() => { el.textContent = ''; });
})();
</script>
